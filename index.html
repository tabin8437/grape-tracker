<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>울화통</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#1a1a2e">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0f0f1a;color:#fff}
.login-screen h1{font-size:24px;margin-bottom:8px;background:linear-gradient(135deg,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-screen p{font-size:12px;color:#6b7280;margin-bottom:24px}
#app{display:none}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;min-height:100vh;display:flex;flex-direction:column;font-family:-apple-system,'Pretendard',sans-serif;overflow-x:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
canvas#particle-canvas{position:fixed;inset:0;pointer-events:none;z-index:200}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
body.shake{animation:shake .2s ease}

/* ── tabs ── */
.tab-bar{display:flex;justify-content:center;gap:0;padding:12px 20px 0}
.tab-btn{flex:1;max-width:160px;padding:10px 0;border:none;background:transparent;color:#6b7280;font-size:14px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:#c084fc;border-bottom-color:#c084fc}
.tab-page{display:none}
.tab-page.active{display:block}

/* ── common ── */
.header{padding:16px 20px 4px;text-align:center;color:#fff}
.header h1{font-size:20px;margin-bottom:2px;background:linear-gradient(135deg,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{font-size:11px;color:#6b7280}
.stats{display:flex;justify-content:center;gap:24px;padding:10px 20px}
.stat{text-align:center;color:#fff}
.stat .num{font-size:30px;font-weight:900;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat .label{font-size:9px;color:#6b7280;margin-top:2px;letter-spacing:1px;text-transform:uppercase}

/* ── grape ── */
.main-area{flex:1;padding:16px 20px 120px;overflow-y:auto;overflow-x:hidden}
.grape-area{display:flex;flex-direction:column;align-items:center;max-width:380px;margin:0 auto;padding:6px 10px 16px}
.grape-stem{width:4px;height:18px;background:#4a7c59;border-radius:2px;margin-bottom:-4px}
.grape-row{display:flex;justify-content:center;gap:5px;margin-top:-9px}
.grape-row:first-child{margin-top:0}
.grape{width:30px;height:30px;border-radius:50%;cursor:pointer;position:relative;animation:pop .4s cubic-bezier(.34,1.56,.64,1);transition:transform .15s,box-shadow .15s;flex-shrink:0}
.grape:hover{transform:scale(1.15);box-shadow:0 0 14px rgba(168,85,247,.6);z-index:2}
.grape:active{transform:scale(1.4)}
.grape .shine{position:absolute;width:8px;height:8px;background:rgba(255,255,255,.35);border-radius:50%;top:5px;left:6px}
.grape-empty{width:30px;height:30px;border-radius:50%;border:1.5px dashed rgba(255,255,255,.13);box-sizing:border-box;flex-shrink:0}
.memo-popup{display:none;position:fixed;bottom:140px;left:50%;transform:translateX(-50%);background:#1e1e3a;border:1px solid #a855f7;color:#e2e8f0;padding:14px 20px;border-radius:14px;font-size:15px;min-width:140px;max-width:300px;text-align:center;z-index:50;box-shadow:0 12px 40px rgba(0,0,0,.7);animation:bubbleIn .25s ease;word-break:break-word;line-height:1.6}
.memo-popup.show{display:block}
.memo-popup .memo-time{font-size:10px;color:#6b7280;margin-top:6px}
@keyframes pop{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
@keyframes burst{0%{transform:scale(1);opacity:1;filter:brightness(1)}50%{transform:scale(1.8);filter:brightness(2)}100%{transform:scale(0);opacity:0;filter:brightness(3)}}
.grape.burst{animation:burst .5s ease-out forwards;pointer-events:none}
@keyframes bubbleIn{0%{transform:translateX(-50%) scale(.8);opacity:0}100%{transform:translateX(-50%) scale(1);opacity:1}}

.add-btn{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);width:72px;height:72px;border-radius:50%;border:none;background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;font-size:34px;cursor:pointer;box-shadow:0 8px 40px rgba(168,85,247,.5);z-index:10;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.add-btn:active{transform:translateX(-50%) scale(.85)}
.add-btn::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:linear-gradient(135deg,#a855f7,#ec4899);opacity:.3;animation:pulse-ring 2s ease infinite;z-index:-1}
@keyframes pulse-ring{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.15);opacity:.1}}

.controls{position:fixed;bottom:34px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:10}
.ctrl-btn{width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.08);color:#fff;font-size:16px;cursor:pointer;backdrop-filter:blur(10px)}
.ctrl-btn:active{background:rgba(255,255,255,.2)}

/* ── sandbag ── */
.sandbag-area{display:flex;flex-direction:column;align-items:center;padding:30px 20px 140px;min-height:400px}
.sandbag-wrap{position:relative;width:140px;margin:20px auto}
.sandbag-rope{width:4px;height:50px;background:linear-gradient(180deg,#6b7280,#4b5563);margin:0 auto;border-radius:2px}
.sandbag{width:140px;height:200px;background:linear-gradient(180deg,#dc2626,#991b1b);border-radius:20px 20px 30px 30px;cursor:pointer;position:relative;transition:transform .05s;box-shadow:0 10px 40px rgba(0,0,0,.5),inset 0 -10px 20px rgba(0,0,0,.3)}
.sandbag::before{content:'';position:absolute;top:0;left:0;right:0;height:25px;background:linear-gradient(180deg,#1a1a2e,#1a1a2e);border-radius:20px 20px 0 0}
.sandbag::after{content:'';position:absolute;top:30%;left:50%;transform:translateX(-50%);width:60%;height:40%;border:3px solid rgba(255,255,255,.1);border-radius:8px}
.sandbag.hit-left{transform:rotate(8deg) translateX(10px)}
.sandbag.hit-right{transform:rotate(-8deg) translateX(-10px)}
.sandbag .hit-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:900;color:rgba(255,255,255,.9);opacity:0;pointer-events:none;text-shadow:0 0 20px rgba(255,255,255,.5)}
.sandbag .hit-text.show{animation:hitPop .4s ease-out}
@keyframes hitPop{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}50%{opacity:1;transform:translate(-50%,-80%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-120%) scale(.8)}}
.combo{font-size:60px;font-weight:900;color:#fff;text-align:center;margin-top:20px;text-shadow:0 0 40px rgba(239,68,68,.5);transition:transform .1s}
.combo.pop{animation:comboPop .2s ease}
@keyframes comboPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.combo-label{font-size:12px;color:#ef4444;text-align:center;letter-spacing:2px;font-weight:700;margin-top:4px}
.combo-msg{font-size:14px;color:#fbbf24;text-align:center;margin-top:12px;font-weight:600;min-height:20px}
.combo-best{font-size:13px;color:#8b8fa3;text-align:center;margin-top:8px;font-weight:600}
.combo-best.new-record{color:#fbbf24;animation:comboPop .3s ease}

/* ── overlays ── */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);background:linear-gradient(135deg,rgba(168,85,247,.95),rgba(236,72,153,.95));color:#fff;padding:12px 24px;border-radius:14px;font-size:14px;font-weight:700;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:100;box-shadow:0 8px 30px rgba(168,85,247,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.memo-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.memo-overlay.open{display:flex}
.memo-box{background:#16213e;border-radius:20px;padding:28px;width:320px;max-width:90vw;border:1px solid rgba(168,85,247,.2)}
.memo-box h3{color:#fff;font-size:16px;margin-bottom:14px}
.memo-box textarea{width:100%;height:80px;background:#0f0f1a;border:1px solid #333;border-radius:12px;color:#fff;padding:12px;font-size:14px;resize:none;font-family:inherit;transition:border-color .2s}
.memo-box textarea:focus{outline:none;border-color:#a855f7}
.memo-box .btns{display:flex;gap:8px;margin-top:14px}
.memo-box .btns button{flex:1;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:transform .1s}
.memo-box .btns button:active{transform:scale(.95)}
.memo-box .btn-save{background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff}
.memo-box .btn-cancel{background:#2a2a4a;color:#9ca3af}
.history{position:fixed;inset:0;background:#0f0f1a;z-index:60;display:none;flex-direction:column}
.history.open{display:flex}
.history-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid #1e1e3a}
.history-header h2{color:#fff;font-size:17px}
.history-close{background:none;border:none;color:#6b7280;font-size:26px;cursor:pointer}
.history-list{flex:1;overflow-y:auto;padding:12px 20px}
.history-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid #1e1e3a}
.history-dot{width:30px;height:30px;border-radius:50%;flex-shrink:0;margin-top:2px;position:relative}
.history-dot .shine{position:absolute;width:8px;height:8px;background:rgba(255,255,255,.3);border-radius:50%;top:5px;left:6px}
.history-info{flex:1}
.history-time{font-size:11px;color:#6b7280}
.history-memo{font-size:13px;color:#d1d5db;margin-top:4px;word-break:break-word}
.history-del{background:none;border:none;color:#4b5563;font-size:16px;cursor:pointer;padding:4px}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <h1>울화통</h1>
  <p id="login-msg">Google 계정으로 로그인</p>
  <div id="g_id_onload"
    data-client_id="272234568921-8m6a55tgvo7e86nsk2u7tjbarqff34en.apps.googleusercontent.com"
    data-callback="onLogin" data-auto_prompt="false" data-use_fedcm_for_prompt="false"></div>
  <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_black" data-text="signin_with" data-shape="pill" data-logo_alignment="left"></div>
  <div id="req-form" style="display:none;margin-top:16px;text-align:center">
    <input id="req-name" placeholder="이름 입력" maxlength="20" style="padding:10px 14px;border-radius:12px;border:1px solid #333;background:#1a1a2e;color:#fff;font-size:14px;margin-bottom:10px;display:block;width:220px;margin:0 auto 10px">
    <button onclick="submitRequest()" style="padding:10px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;font-size:14px;font-weight:700;cursor:pointer">접근 요청</button>
  </div>
</div>

<!-- Admin Modal -->
<div id="admin-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(4px)" onclick="if(event.target===this)closeAdmin()">
  <div style="background:#1a1a2e;border:1px solid #333;border-radius:18px;padding:24px;width:360px;max-width:92vw;max-height:80vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.8)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="color:#fff;font-size:16px;font-weight:800">👑 사용자 관리</h2>
      <button onclick="closeAdmin()" style="background:none;border:none;color:#6b7280;font-size:22px;cursor:pointer">✕</button>
    </div>
    <div id="admin-list"></div>
  </div>
</div>

<div id="app">
<canvas id="particle-canvas"></canvas>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('grape')">포도밭</button>
  <button class="tab-btn" onclick="switchTab('sandbag')">샌드백</button>
</div>

<!-- ══ 포도밭 탭 ══ -->
<div class="tab-page active" id="page-grape">
  <div class="header">
    <h1>울화통 포도밭</h1>
    <p>화날 때마다 하나씩, 터뜨려도 좋아</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="num" id="total-count">0</div><div class="label">오늘</div></div>
    <div class="stat"><div class="num" id="all-count">0</div><div class="label">이번 달</div></div>
    <div class="stat"><div class="num" id="streak-count">0</div><div class="label">연속일</div></div>
  </div>
  <div class="main-area">
    <div class="grape-area" id="grape-area"></div>
  </div>
  <button class="add-btn" id="add-btn" onclick="openMemo()">+</button>
  <div class="controls">
    <button class="ctrl-btn" onclick="openHistory()">📋</button>
    <button class="ctrl-btn" onclick="resetToday()">🗑</button>
    <button class="ctrl-btn" id="btn-admin" style="display:none" onclick="openAdmin()">⚙️</button>
  </div>
</div>

<!-- ══ 샌드백 탭 ══ -->
<div class="tab-page" id="page-sandbag">
  <div class="header">
    <h1>샌드백</h1>
    <p>마구 때려, 아무도 안 봐</p>
  </div>
  <div class="sandbag-area">
    <div class="sandbag-wrap">
      <div class="sandbag-rope"></div>
      <div class="sandbag" id="sandbag" ontouchstart="punchBag(event)" onclick="punchBag(event)">
        <div class="hit-text" id="hit-text">💥</div>
      </div>
    </div>
    <div class="combo" id="combo-num">0</div>
    <div class="combo-label">COMBO</div>
    <div class="combo-msg" id="combo-msg"></div>
    <div class="combo-best" id="combo-best">최고기록 0</div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="memo-popup" id="memo-popup" onclick="this.classList.remove('show')"></div>

<div class="memo-overlay" id="memo-overlay" onclick="if(event.target===this)closeMemo()">
  <div class="memo-box">
    <h3>뭐가 화났어? (안 써도 됨)</h3>
    <textarea id="memo-input" placeholder="짧게 적어봐..."></textarea>
    <div class="btns">
      <button class="btn-cancel" onclick="closeMemo()">취소</button>
      <button class="btn-save" onclick="addGrape()">추가</button>
    </div>
  </div>
</div>

<div class="history" id="history">
  <div class="history-header">
    <h2>전체 기록</h2>
    <button class="history-close" onclick="closeHistory()">✕</button>
  </div>
  <div class="history-list" id="history-list"></div>
</div>

<script>
/* ── Auth ── */
var API_URL='https://script.google.com/macros/s/AKfycbwj3k6xaBQKUXiZLesgBE9IxzM-5eG3bDvYNr8BybKn9l0KnMV9CqMeitrkE6U7uPbzNA/exec';
var ADMIN_EMAIL='tabin8437@gmail.com';
var _loginUser=null;

function decodeJwt(t){try{var b=t.split('.')[1];return JSON.parse(atob(b.replace(/-/g,'+').replace(/_/g,'/')));}catch(e){return null;}}
function enc(t){return btoa(unescape(encodeURIComponent(t)));}
function apiGet(params){return fetch(API_URL+'?'+params+'&t='+Date.now()).then(function(r){return r.json();});}

function setMsg(txt,color){var el=document.getElementById('login-msg');el.textContent=txt;el.style.color=color||'#6b7280';}

function onLogin(response){
  var p=decodeJwt(response.credential);
  if(!p||!p.email)return;
  var email=p.email.toLowerCase();
  _loginUser={email:email,name:p.name||email};
  setMsg('확인 중...');
  apiGet('action=check&email='+encodeURIComponent(email)).then(function(res){
    var user=res.user;
    if(email===ADMIN_EMAIL||( user&&user.status==='approved')){
      sessionStorage.setItem('grape_user',JSON.stringify(_loginUser));
      startApp();
    } else if(user&&user.status==='pending'){
      setMsg('관리자 승인 대기 중입니다 🕐','#f59e0b');
    } else {
      setMsg('접근 권한이 없습니다. 이름을 입력하고 요청하세요.','#f87171');
      document.getElementById('req-form').style.display='block';
    }
  }).catch(function(){
    setMsg('서버 연결 실패. 잠시 후 다시 시도해주세요.','#f87171');
  });
}

function submitRequest(){
  var name=document.getElementById('req-name').value.trim();
  if(!name){alert('이름을 입력해주세요.');return;}
  if(!_loginUser)return;
  setMsg('요청 중...','#a855f7');
  document.getElementById('req-form').style.display='none';
  apiGet('action=register&email='+encodeURIComponent(_loginUser.email)+'&name='+encodeURIComponent(enc(name))).then(function(){
    setMsg('접근 요청 완료! 관리자 승인 후 이용 가능합니다 ✅','#a855f7');
  }).catch(function(){
    setMsg('요청 실패. 다시 시도해주세요.','#f87171');
    document.getElementById('req-form').style.display='block';
  });
}

function startApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  var u=JSON.parse(sessionStorage.getItem('grape_user')||'null');
  var isAdmin=(u&&u.email&&u.email.toLowerCase()===ADMIN_EMAIL)||(_loginUser&&_loginUser.email===ADMIN_EMAIL);
  if(isAdmin) document.getElementById('btn-admin').style.display='flex';
  render();
}
var _APP_VER='v15';
(function(){
  if(localStorage.getItem('grape_ver')!==_APP_VER){localStorage.removeItem('grape_user');sessionStorage.removeItem('grape_user');localStorage.setItem('grape_ver',_APP_VER);}
  try{var u=JSON.parse(sessionStorage.getItem('grape_user'));if(u&&u.email)startApp();}catch(e){}
})();

/* ── Admin ── */
function openAdmin(){
  document.getElementById('admin-overlay').style.display='flex';
  loadAdminList();
}
function closeAdmin(){document.getElementById('admin-overlay').style.display='none';}
function loadAdminList(){
  var el=document.getElementById('admin-list');
  el.innerHTML='<p style="color:#6b7280;font-size:13px">불러오는 중...</p>';
  apiGet('action=list').then(function(res){
    var users=res.users||[];
    if(!users.length){el.innerHTML='<p style="color:#6b7280;font-size:13px;text-align:center">사용자 없음</p>';return;}
    var pending=users.filter(function(u){return u.status==='pending';});
    var approved=users.filter(function(u){return u.status!=='pending';});
    var html='';
    if(pending.length) html+='<div style="font-size:11px;font-weight:700;color:#f59e0b;margin-bottom:8px">⏳ 승인 대기 ('+pending.length+')</div>';
    pending.forEach(function(u){
      html+='<div style="background:#1e1e3a;border:1px solid #f59e0b44;border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px">'
        +'<div><div style="color:#fff;font-size:13px;font-weight:700">'+esc(u.name||u.email)+'</div><div style="color:#6b7280;font-size:11px">'+esc(u.email)+'</div></div>'
        +'<div style="display:flex;gap:6px">'
        +'<button onclick="approveUser(\''+u.email+'\')" style="background:#a855f7;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer">승인</button>'
        +'<button onclick="rejectUser(\''+u.email+'\')" style="background:#374151;color:#9ca3af;border:none;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer">거부</button>'
        +'</div></div>';
    });
    if(approved.length){
      html+='<div style="font-size:11px;font-weight:700;color:#6b7280;margin:12px 0 8px">✅ 승인된 멤버 ('+approved.length+')</div>';
      approved.forEach(function(u){
        html+='<div style="background:#111827;border:1px solid #1f2937;border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">'
          +'<div><div style="color:#d1d5db;font-size:13px">'+esc(u.name||u.email)+'</div><div style="color:#4b5563;font-size:11px">'+esc(u.email)+'</div></div>'
          +'<button onclick="rejectUser(\''+u.email+'\')" style="background:#1f2937;color:#6b7280;border:none;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer">삭제</button>'
          +'</div>';
      });
    }
    el.innerHTML=html;
  }).catch(function(){el.innerHTML='<p style="color:#f87171;font-size:13px">불러오기 실패</p>';});
}
function approveUser(email){
  apiGet('action=update&email='+encodeURIComponent(email)+'&status=approved').then(function(){loadAdminList();});
}
function rejectUser(email){
  if(!confirm(email+' 을(를) 삭제할까요?'))return;
  apiGet('action=delete&email='+encodeURIComponent(email)).then(function(){loadAdminList();});
}

/* ── Tabs ── */
function switchTab(id){
  document.querySelectorAll('.tab-btn').forEach(function(b,i){b.classList.toggle('active',i===(id==='grape'?0:1));});
  document.querySelectorAll('.tab-page').forEach(function(p){p.classList.remove('active');});
  document.getElementById('page-'+id).classList.add('active');
  if(id==='sandbag')renderBestCombo();
}

/* ── Particles ── */
var COLORS=[
  'radial-gradient(circle at 35% 35%,#c084fc,#7c3aed)',
  'radial-gradient(circle at 35% 35%,#f472b6,#db2777)',
  'radial-gradient(circle at 35% 35%,#a78bfa,#6d28d9)',
  'radial-gradient(circle at 35% 35%,#fb923c,#ea580c)',
  'radial-gradient(circle at 35% 35%,#34d399,#059669)',
  'radial-gradient(circle at 35% 35%,#60a5fa,#2563eb)',
  'radial-gradient(circle at 35% 35%,#fbbf24,#d97706)',
  'radial-gradient(circle at 35% 35%,#e879f9,#a21caf)',
];
var FLAT_COLORS=['#c084fc','#f472b6','#a78bfa','#fb923c','#34d399','#60a5fa','#fbbf24','#e879f9'];
var canvas=document.getElementById('particle-canvas');
var ctx=canvas.getContext('2d');
var particles=[];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resizeCanvas);resizeCanvas();

function spawnParticles(x,y,color,count){
  var n=count||25;
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2,sp=2+Math.random()*6,sz=3+Math.random()*5;
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,size:sz,color:color||FLAT_COLORS[Math.floor(Math.random()*FLAT_COLORS.length)],life:1,decay:.015+Math.random()*.02,gravity:.1});
  }
}
function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.life-=p.decay;p.vx*=.98;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;requestAnimationFrame(animateParticles);
}
animateParticles();

/* ── Grape (포도밭) ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getData(){try{return JSON.parse(localStorage.getItem('grape_data'))||[];}catch(e){return[];}}
function saveData(d){localStorage.setItem('grape_data',JSON.stringify(d));}
function todayStr(){return new Date().toISOString().slice(0,10);}

document.addEventListener('click',function(e){
  if(!e.target.closest('.grape')&&!e.target.closest('.memo-popup')){
    document.getElementById('memo-popup').classList.remove('show');
    document.querySelectorAll('.grape.tapped').forEach(function(el){el.classList.remove('tapped');});
  }
});

var MONTH_SLOTS=90;
function buildBunchRows(target){
  // 위는 살짝 넓게 시작해서 봉우리까지 커졌다가, 끝에는 항상 1개(뾰족한 끝)로 마무리되는 포도송이 모양.
  // 중간에 자르지 않고 항상 끝까지 완성된 모양이 나오도록, 정점 폭을 늘려가며 목표치를 넘을 때까지 키운다.
  var k=2,rows;
  while(true){
    rows=[];
    for(var w=2;w<=k;w++) rows.push(w);
    for(var w=k-1;w>=1;w--) rows.push(w);
    var sum=rows.reduce(function(a,b){return a+b;},0);
    if(sum>=target||k>=20) break;
    k++;
  }
  return rows;
}

function render(){
  document.getElementById('memo-popup').classList.remove('show');
  var data=getData(),today=todayStr();
  var monthPrefix=today.slice(0,7);
  var todayItems=data.filter(function(d){return d.date===today;});
  var monthItems=data.filter(function(d){return d.date&&d.date.slice(0,7)===monthPrefix;});
  document.getElementById('total-count').textContent=todayItems.length;
  document.getElementById('all-count').textContent=monthItems.length;
  var dates=[...new Set(data.map(function(d){return d.date;}))].sort().reverse();
  var streak=0,check=new Date();
  for(var i=0;i<dates.length;i++){if(dates[i]===check.toISOString().slice(0,10)){streak++;check.setDate(check.getDate()-1);}else break;}
  document.getElementById('streak-count').textContent=streak;
  var area=document.getElementById('grape-area');area.innerHTML='';

  // 이번 달 안에서 시간순(오래된 것부터)으로 정렬 → 포도송이 위에서부터 차오르게
  var sortedMonth=monthItems.slice().sort(function(a,b){return new Date(a.time)-new Date(b.time);});

  var stem=document.createElement('div');stem.className='grape-stem';area.appendChild(stem);

  var rows=buildBunchRows(Math.max(MONTH_SLOTS,sortedMonth.length));
  var globalIdx=0;
  rows.forEach(function(rowCount){
    var rowEl=document.createElement('div');rowEl.className='grape-row';
    for(var c=0;c<rowCount;c++){
      var idx=globalIdx++;
      if(idx<sortedMonth.length){
        rowEl.appendChild(buildGrapeEl(sortedMonth[idx],idx));
      }else{
        var empty=document.createElement('div');empty.className='grape-empty';
        rowEl.appendChild(empty);
      }
    }
    area.appendChild(rowEl);
  });
}

function buildGrapeEl(item,idx){
  var g=document.createElement('div');g.className='grape';g.style.background=COLORS[idx%COLORS.length];g.style.animationDelay=(Math.min(idx,20)*40)+'ms';
  g.innerHTML='<div class="shine"></div>';
  var memo=item.memo,time=new Date(item.time).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  var dd=new Date(item.date+'T00:00:00');
  g.title=(dd.getMonth()+1)+'월 '+dd.getDate()+'일 '+time+(memo?' - '+memo:'');
  g.addEventListener('click',function(e){
    e.stopPropagation();
    if(g.classList.contains('tapped')){
      var r=g.getBoundingClientRect();spawnParticles(r.left+r.width/2,r.top+r.height/2,FLAT_COLORS[idx%FLAT_COLORS.length]);
      g.classList.add('burst');document.body.classList.add('shake');document.getElementById('memo-popup').classList.remove('show');showToast('팡!');
      setTimeout(function(){g.classList.remove('burst');g.classList.remove('tapped');document.body.classList.remove('shake');},500);
    }else{
      document.querySelectorAll('.grape.tapped').forEach(function(el){el.classList.remove('tapped');});
      g.classList.add('tapped');
      var popup=document.getElementById('memo-popup');
      popup.innerHTML=(dd.getMonth()+1)+'월 '+dd.getDate()+'일'+(memo?'<br>'+esc(memo):'')+'<div class="memo-time">'+time+'</div>';
      popup.classList.add('show');
    }
  });
  return g;
}

function openMemo(){document.getElementById('memo-overlay').classList.add('open');document.getElementById('memo-input').value='';setTimeout(function(){document.getElementById('memo-input').focus();},100);}
function closeMemo(){document.getElementById('memo-overlay').classList.remove('open');}
function addGrape(){
  var memo=document.getElementById('memo-input').value.trim(),data=getData();
  data.push({date:todayStr(),time:new Date().toISOString(),memo:memo});saveData(data);closeMemo();render();
  setTimeout(function(){var btn=document.getElementById('add-btn'),r=btn.getBoundingClientRect();spawnParticles(r.left+r.width/2,r.top+r.height/2);document.body.classList.add('shake');setTimeout(function(){document.body.classList.remove('shake');},300);},100);
  showToast(getRandomMsg());
}
function getRandomMsg(){var m=['한 알 추가!','그래, 화낼 수 있지','알 하나 더 익어간다','꾹 참았다 대단해','기록 완료!','화난 만큼 성장 중','괜찮아, 다 지나가','오늘도 생존 완료','참느라 고생했다','이것도 경험이다','나중에 웃을 날 온다','일단 기록하는 너 멋져','화는 기록하면 반으로 줄어','숨 한번 크게 쉬어','내일은 좀 나을 거야','포도주 될 때까지 익혀'];return m[Math.floor(Math.random()*m.length)];}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1800);}
function resetToday(){if(!confirm('오늘 기록을 전부 지울까요?'))return;var d=getData();d=d.filter(function(x){return x.date!==todayStr();});saveData(d);render();showToast('초기화 완료');}

function openHistory(){
  document.getElementById('history').classList.add('open');
  var data=getData().slice().reverse(),list=document.getElementById('history-list');
  if(!data.length){list.innerHTML='<p style="color:#6b7280;text-align:center;padding:40px">아직 기록이 없어요</p>';return;}
  var html='',lastDate='';
  data.forEach(function(item,i){
    var d=item.date;if(d!==lastDate){html+='<div style="padding:12px 0 4px;font-size:12px;font-weight:700;color:#a855f7">'+d+'</div>';lastDate=d;}
    var ts=new Date(item.time).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    html+='<div class="history-item"><div class="history-dot" style="background:'+COLORS[i%COLORS.length]+'"><div class="shine"></div></div><div class="history-info"><div class="history-time">'+ts+'</div>'+(item.memo?'<div class="history-memo">'+esc(item.memo)+'</div>':'')+'</div><button class="history-del" onclick="delItem('+i+')">✕</button></div>';
  });
  list.innerHTML=html;
}
function closeHistory(){document.getElementById('history').classList.remove('open');}
function delItem(ri){var d=getData();d.splice(d.length-1-ri,1);saveData(d);openHistory();render();}

/* ── Sandbag (샌드백) ── */
var comboCount=0,comboTimer=null,punchLock=false;

function getBestComboKey(){
  try{var u=JSON.parse(sessionStorage.getItem('grape_user')||'null');return 'sandbag_best_'+((u&&u.email)||'guest');}catch(e){return 'sandbag_best_guest';}
}
function getBestCombo(){return parseInt(localStorage.getItem(getBestComboKey())||'0',10);}
function renderBestCombo(){
  var el=document.getElementById('combo-best');
  if(el)el.textContent='최고기록 '+getBestCombo();
}
function checkBestCombo(count){
  var best=getBestCombo();
  if(count>best){
    localStorage.setItem(getBestComboKey(),String(count));
    var el=document.getElementById('combo-best');
    if(el){el.textContent='🏆 신기록! '+count;el.classList.remove('new-record');void el.offsetWidth;el.classList.add('new-record');}
  }
}
var HIT_WORDS=['💥','POW','BAM','SMACK','👊','BOOM','CRACK','퍽!','빡!','💢','WHAM','KO','찰싹!','억!','💀','BANG','으악!'];
var COMBO_MSGS={5:'워밍업?',10:'좀 치네?',15:'손 풀렸다',20:'박치기 각',25:'미쳤다',30:'야수의 심장',40:'킬러 본능',50:'🥊 폭풍 주먹!',60:'멈출 수 없다',75:'분노의 질주',85:'나를 막을 자 없다',100:'🔥 전설의 주먹 🔥',125:'🌋 화산 폭발',150:'⚡ 번개 주먹',175:'💀 사신 강림',200:'☠️ 파괴신 ☠️',250:'🪐 행성 파괴자',300:'🌌 우주 멸망급',500:'?????? 뭐야 그만 쳐'};

function punchBag(e){
  e.preventDefault();
  if(punchLock)return;punchLock=true;setTimeout(function(){punchLock=false;},80);
  var bag=document.getElementById('sandbag');
  var dir=comboCount%2===0?'hit-left':'hit-right';
  bag.classList.remove('hit-left','hit-right');void bag.offsetWidth;bag.classList.add(dir);
  setTimeout(function(){bag.classList.remove(dir);},100);

  var rect=bag.getBoundingClientRect();
  var tx=rect.left+Math.random()*rect.width,ty=rect.top+Math.random()*rect.height;
  spawnParticles(tx,ty,'#ef4444',15);
  spawnParticles(tx,ty,'#fbbf24',8);

  var ht=document.getElementById('hit-text');
  ht.textContent=HIT_WORDS[Math.floor(Math.random()*HIT_WORDS.length)];
  ht.classList.remove('show');void ht.offsetWidth;ht.classList.add('show');
  setTimeout(function(){ht.classList.remove('show');},400);

  comboCount++;
  var cn=document.getElementById('combo-num');cn.textContent=comboCount;
  cn.classList.remove('pop');void cn.offsetWidth;cn.classList.add('pop');
  checkBestCombo(comboCount);

  document.body.classList.add('shake');setTimeout(function(){document.body.classList.remove('shake');},200);

  if(navigator.vibrate)navigator.vibrate(30);

  // 특수 임팩트
  if(comboCount%10===0&&comboCount>0){
    for(var j=0;j<5;j++)spawnParticles(Math.random()*canvas.width,Math.random()*canvas.height,null,20);
    if(navigator.vibrate)navigator.vibrate([50,30,50]);
  }
  if(comboCount%50===0&&comboCount>0){
    document.body.style.background='#fff';setTimeout(function(){document.body.style.background='#0f0f1a';},80);
    for(var j=0;j<10;j++)spawnParticles(canvas.width/2,canvas.height/2,null,40);
    if(navigator.vibrate)navigator.vibrate([100,50,100,50,100]);
  }

  var msg=COMBO_MSGS[comboCount];
  if(msg)document.getElementById('combo-msg').textContent=msg;

  clearTimeout(comboTimer);
  comboTimer=setTimeout(function(){
    if(comboCount>=10)showToast(comboCount+'콤보 달성!');
    comboCount=0;document.getElementById('combo-num').textContent='0';document.getElementById('combo-msg').textContent='';
  },2000);
}

render();
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
